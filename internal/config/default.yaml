# kekkai edge agent configuration.
#
# EN: Validation is strict. Unknown keys, invalid ports, bad CIDRs, or the
#     same port in both public and private cause the agent to refuse to
#     start. Use `kekkai check /path/to/kekkai.yaml` to validate without
#     launching.
# ZH: 驗證採嚴格模式。未知欄位、非法 port、壞 CIDR、或同一 port 同時出現在
#     public 與 private 都會讓 agent 拒絕啟動。可用 `kekkai check <path>`
#     離線驗證。
#
# EN: Schema version. Reserved for future migrations.
# ZH: Schema 版本號。保留給未來的 migration 機制使用。
version: __VERSION__

# ---------- identity ----------
node:
  # EN: Node identifier. Defaults to hostname if empty.
  # ZH: 節點識別。留空自動用 hostname。
  id: __NODE_ID__

  # EN: Region label consumed by future NATS integration.
  # ZH: 區域標籤，供未來 NATS 整合使用。
  region: __NODE_REGION__

# ---------- network interface ----------
interface:
  # EN: REQUIRED. XDP attaches here.
  # ZH: 必填。XDP 會 attach 到這張網卡。
  name: __INTERFACE_NAME__

  # EN: generic | driver | offload
  #     - generic: works everywhere, slowest (RPi macb/bcmgenet are here)
  #     - driver:  native XDP, needs driver support (ixgbe/i40e/mlx5/ena/bnxt_en)
  #     - offload: SmartNIC hardware offload (rare)
  #     If `driver` fails at attach time the loader auto-falls-back to
  #     `generic`.
  # ZH: XDP 模式選擇。
  #     - generic: 相容性最好也最慢 (RPi macb/bcmgenet 只能用這個)
  #     - driver:  native XDP，要網卡 driver 支援
  #     - offload: 用 SmartNIC 硬體 (很少見)
  #     driver 失敗時會自動降級回 generic。
  xdp_mode: __INTERFACE_XDP_MODE__

# ---------- update channel ----------
update:
  # EN: Select where `kekkai update` downloads its release assets from:
  #     - release     -> latest stable release from GitHub Releases
  #     - pre-release -> latest pre-release from GitHub Releases
  # ZH: 指定 `kekkai update` 下載來源：
  #     - release     -> 從 GitHub Releases 抓最新穩定版
  #     - pre-release -> 從 GitHub Releases 抓最新預發布版
  channel: __UPDATE_CHANNEL__

  # EN: auto_update_download — let kekkai-agent poll the GitHub Releases
  #     API every auto_update_interval hours and stage newer binaries into
  #     /var/lib/kekkai/staged/. The currently running agent is NOT touched
  #     while staging — use `sudo kekkai update` or set auto_update_reload
  #     below to actually apply the staged binaries.
  # ZH: 自動下載。true 時 kekkai-agent 會每 auto_update_interval 小時
  #     檢查 GitHub Releases，有新版就放到 /var/lib/kekkai/staged/，
  #     不影響運行中的 agent；需透過 auto_update_reload 或手動
  #     `sudo kekkai update` 才會套用新版。
  auto_update_download: __AUTO_UPDATE_DOWNLOAD__

  # EN: auto_update_reload — after a successful stage, delegate to
  #     kekkai.sh to install the new binaries and `systemctl restart`
  #     the service. XDP detaches for ~1s during restart.
  #     Requires auto_update_download=true.
  # ZH: 自動套用。下載後委派 kekkai.sh 安裝新 binary 並 restart service
  #     (XDP 短暫 detach 約 1 秒)。需先啟用 auto_update_download。
  auto_update_reload: __AUTO_UPDATE_RELOAD__

  # EN: auto_update_interval — poll cadence in hours, 1..24.
  # ZH: 自動更新檢查間隔，單位小時，允許 1..24。
  auto_update_interval: __AUTO_UPDATE_INTERVAL__

# ---------- runtime toggles ----------
runtime:
  # EN: Emergency bypass loads the eBPF program and maps but does NOT attach
  #     the XDP hook. Flip to true via SIGHUP when rules look suspect — the
  #     network is restored instantly, maps stay populated, and you can
  #     re-enable once the config is fixed.
  # ZH: 緊急旁路。true = 載入 eBPF 但不 attach 到網卡。規則懷疑有問題時
  #     透過 SIGHUP 切 true 快速恢復網路，不必 stop service。
  emergency_bypass: __RUNTIME_EMERGENCY_BYPASS__

  # EN: Entry count of the per-source-IPv4 LRU hash used for statistics (not
  #     filtering). It is a PER-CPU map, so kernel memory ≈ entries × nCPU ×
  #     ~64 B. The MiB figures below assume a single CPU — multiply by core
  #     count. Power of 2 recommended.
  #       65 536  →  ~4 MiB/CPU   typical scan <5 ms   (default)
  #       262 144 → ~16 MiB/CPU
  #      1 048 576 → ~64 MiB/CPU  typical scan <50 ms on a Pi
  #     Changing this value requires a full restart.
  # ZH: per-source-IPv4 LRU hash 容量 (統計用，不是過濾用)。這是 PER-CPU map，
  #     kernel 記憶體 ≈ 筆數 × CPU 數 × ~64 B；下面的 MiB 是單 CPU，要乘上
  #     核心數。建議用 2 的次方。修改需重啟 agent。
  perip_table_size: __RUNTIME_PERIP_TABLE_SIZE__

# ---------- observability ----------
observability:
  # EN: Human-readable stats snapshot. Monitor with:
  #       watch -n 1 cat /var/run/kekkai/stats.txt
  # ZH: 人類可讀的統計快照檔。用 `watch -n 1 cat <path>` 監看。
  stats_file: __OBSERVABILITY_STATS_FILE__

# ---------- security ----------
security:
  # EN: Single switch for how SSH (port 22) is treated by the running
  #     filter. Port 22 is applied to the eBPF maps IMPLICITLY — it is never
  #     written into this file:
  #       - true  -> SSH allowed on public (any source); startup WARNs.
  #       - false -> SSH allowed on private (ingress_allowlist only).
  #     You normally leave 22 unlisted and let this flag decide. You MAY
  #     still list 22 explicitly, but only in the group that matches the
  #     flag — listing it in the contradicting group (22 in public.tcp with
  #     false, or 22 in private.tcp with true) is a fatal validation error,
  #     as is listing it in both groups.
  # ZH: 決定執行中的 filter 怎麼處理 SSH (port 22) 的單一開關。22 是「隱式」
  #     套用到 eBPF map，永遠不會被寫進這個檔案：
  #       - true  -> SSH 開在 public (任何來源)，啟動時印一行 WARN log。
  #       - false -> SSH 開在 private (只允許 ingress_allowlist)。
  #     正常情況不用填 22，交給這個 flag 決定；你也可以手動填，但只能填進和
  #     flag 一致的 group——填進矛盾的 group（false 卻把 22 放 public.tcp、
  #     或 true 卻放 private.tcp）會拒絕啟動，同時出現在兩個 group 也是。
  allow_ssh_public: __SECURITY_ALLOW_SSH_PUBLIC__

# ---------- filter rules ----------
#
# EN: Inbound packet decision flow (strict model):
#   1. ARP                         → PASS (toggle: filter.allow_arp)
#      non-IPv4/ARP                → DROP
#   2. IP fragment 2+ (offset > 0) → DROP (no L4 header; would bypass policy)
#   3. stateful return traffic     → PASS
#        · TCP/UDP matched by the conntrack fast path (seeded by the TC
#          egress hook — requires kernel >= 6.6 / TCX, which is mandatory)
#        · ICMP (toggle: filter.allow_icmp)
#        · UDP dst 68 (DHCP client lease renewal)
#      NOTE: there is NO stateless TCP "ACK/RST/FIN" fallback — return
#      traffic must be a real conntrack hit.
#   4. src in static_blocklist     → DROP
#   5. src in dynamic blocklist    → DROP (M6 / NATS push)
#   6. dst port in filter.public.* → PASS (any source)
#   7. dst port in filter.private.*:
#        · src in ingress_allowlist → PASS
#        · otherwise                → DROP
#   8. no rule matched             → DROP (default deny)
#
# ZH: 進站封包決策流程 (strict model)：
#   1. ARP                         → PASS (可由 filter.allow_arp 控制)
#      非 IPv4/ARP                 → DROP
#   2. IP 分片後續片段 (offset>0)   → DROP (無 L4 header，放行會繞過 policy)
#   3. 有狀態回程流量               → PASS
#        · TCP/UDP 由 conntrack fast path 命中 (靠 TC egress hook 種子，
#          需 kernel >= 6.6 / TCX，為強制需求)
#        · ICMP (由 filter.allow_icmp 控制)
#        · UDP dst 68 (DHCP client 續租)
#      注意：沒有無狀態的 TCP "ACK/RST/FIN" fallback —— 回程必須是真正的
#      conntrack 命中。
#   4. src 在 static_blocklist     → DROP
#   5. src 在 dynamic blocklist    → DROP (M6 / NATS 推送)
#   6. dst port 在 filter.public.* → PASS (任何來源)
#   7. dst port 在 filter.private.*:
#        · src 在 ingress_allowlist → PASS
#        · 否則                      → DROP
#   8. 都沒命中                     → DROP (預設拒絕)
#
# EN: The agent's own outgoing traffic is never inspected (XDP is ingress
#     only); the TC egress hook seeds a flow so responses match the conntrack
#     fast path (step 3) without any extra config.
# ZH: agent 自己主動出去的連線不會被檢查 (XDP 只 hook ingress)；TC egress hook
#     會種下 flow，回程封包靠 conntrack fast path (步驟 3) 放行，不用特別設定。
filter:
  # EN: allow_icmp controls whether ICMP is treated as return traffic.
  # ZH: 控制 ICMP 是否視為回程流量直接放行。
  allow_icmp: __FILTER_ALLOW_ICMP__

  # EN: allow_arp controls L2 ARP pass-through. Turning this off can make the
  #     host appear down when ARP cache expires.
  # ZH: 控制 L2 ARP 是否放行。關閉後 ARP cache 過期時可能出現主機離線。
  allow_arp: __FILTER_ALLOW_ARP__

  # EN: Lower bound for UDP return-traffic classification.
  # ZH: UDP 回程流量判定門檻下限。
  udp_ephemeral_min: __FILTER_UDP_EPHEMERAL_MIN__

  public:
    # EN: Services open to the public internet. Any source IP can connect
    #     except those in static_blocklist or the dynamic blocklist.
    # ZH: 對外開放的服務 port。任何來源都可連，但黑名單例外。
    tcp:
__FILTER_PUBLIC_TCP__
    udp:
__FILTER_PUBLIC_UDP__

  private:
    # EN: Services only ingress_allowlist can reach. Everyone else dropped.
    #     When security.allow_ssh_public is false, SSH (22) is allowed here
    #     implicitly by the running filter — you don't (and shouldn't) list it.
    # ZH: 只允許 ingress_allowlist 連線的服務 port。其他全 DROP。
    #     security.allow_ssh_public=false 時，執行中的 filter 會隱式允許
    #     SSH (22)，你不用（也不該）自己列進來。
    tcp:
__FILTER_PRIVATE_TCP__
    udp:
__FILTER_PRIVATE_UDP__

  # EN: Allowlist for private ports. CIDR and single IPs both work — a bare
  #     address is treated as /32. Longest prefix match wins (LPM trie).
  # ZH: private port 的來源白名單。CIDR 與單 IP 都可 (裸 IP 視為 /32)。
  #     LPM trie 最長前綴匹配。
  ingress_allowlist:
__FILTER_INGRESS_ALLOWLIST__
    # - 192.168.0.0/16
    # - 10.0.0.0/8
    # - 100.64.0.0/10      # Tailscale

  # EN: Static blocklist. Matches any destination port. CIDRs or single IPs.
  #     Evaluated before any allow rules (static beats allowlist).
  # ZH: 靜態黑名單。不管 dst port，一律 DROP。支援 CIDR 與單 IP。
  #     在 allowlist 之前生效 (黑名單優先)。
  static_blocklist:
__FILTER_STATIC_BLOCKLIST__
    # - 203.0.113.4
    # - 198.51.100.0/24
