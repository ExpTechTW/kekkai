name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        id: setup-go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-ci-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-ci-
            ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-

      - name: Validate shell scripts
        run: bash -n kekkai.sh

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          go build -o bin/kekkai ./cmd/kekkai
          go build -o bin/kekkai-agent ./cmd/kekkai-agent
