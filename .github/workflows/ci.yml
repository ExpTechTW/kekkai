name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate shell scripts
        run: bash -n kekkai.sh

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          go build -o bin/kekkai ./cmd/kekkai
          go build -o bin/kekkai-agent ./cmd/kekkai-agent
