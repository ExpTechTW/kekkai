name: Draft Release Artifacts

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        id: setup-go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-${{ matrix.goos }}-${{ matrix.goarch }}-
            ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-

      - name: Read version
        id: read-version
        run: |
          VERSION="$(tr -d ' \n\r' < internal/buildinfo/VERSION)"
          if [ -z "$VERSION" ]; then
            echo "VERSION is empty" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.read-version.outputs.version }}
        run: |
          mkdir -p dist
          go build -ldflags "-s -w -X main.version=${VERSION}" -o "dist/kekkai-${GOOS}-${GOARCH}" ./cmd/kekkai
          go build -ldflags "-s -w -X main.version=${VERSION}" -o "dist/kekkai-agent-${GOOS}-${GOARCH}" ./cmd/kekkai-agent

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bins-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish-draft:
    runs-on: ubuntu-latest
    needs: build-artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: read-version
        run: |
          VERSION="$(tr -d ' \n\r' < internal/buildinfo/VERSION)"
          if [ -z "$VERSION" ]; then
            echo "VERSION is empty" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish / update draft release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.read-version.outputs.version }}-draft
          name: v${{ steps.read-version.outputs.version }} Draft (auto)
          body: |
            Auto-generated draft release from `main`.
            Version: v${{ steps.read-version.outputs.version }}
            Commit: ${{ github.sha }}
          draft: true
          prerelease: false
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: "dist/*"
